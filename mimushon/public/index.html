    <script>
  // Wait for the document to be fully loaded
  document.addEventListener('DOMContentLoaded', () => {
    // Select all anchor links that have a 'href' starting with '#'
    const anchorLinks = document.querySelectorAll('a[href^="#"]');

    anchorLinks.forEach(link => {
      link.addEventListener('click', function(e) {
        // 1. Prevent the default jump-to-anchor behavior
        e.preventDefault();

        // 2. Get the target element's ID from the href attribute
        const targetId = this.getAttribute('href');
        const targetElement = document.querySelector(targetId);

        if (targetElement) {
          // 3. Use scrollIntoView() with options
          targetElement.scrollIntoView({
            behavior: 'smooth', // This mirrors the CSS behavior, but is more explicit
            block: 'end'
           });
        }
      });
    });
  });
</script>
